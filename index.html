<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EigenVision</title>

<style>
:root {
  --bg: #000000;
  --line: rgba(255, 255, 255, 0.08);
  --text: #f5f7fb;
  --muted: rgba(255, 255, 255, 0.68);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
  overflow-x: hidden;
  background:
    radial-gradient(circle at 20% 10%, rgba(0, 80, 160, 0.06), transparent 28%),
    radial-gradient(circle at 70% 35%, rgba(120, 0, 0, 0.05), transparent 24%),
    #000;
}

/* FLASH */
.flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,0,0,0.9), transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 999;
}

/* BRAND */
.brand-block {
  position: absolute;
  top: 28px;
  left: 28px;
  display: flex;
  align-items: center;
  gap: 0;
  filter: drop-shadow(0 0 10px rgba(80,150,255,0.15));
}

.logo-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  transform: translateY(-4px);
}

.logo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* başlangıç */
#logo-red { opacity: 1; }
#logo-blue { opacity: 0; }

/* ANIMATIONS */
@keyframes redPulse {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.8); }
}

@keyframes redFadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes blueFadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* ACTIVE STATE */
.logo-wrapper.active #logo-red {
  animation:
    redPulse 2s ease forwards,
    redFadeOut 0.5s ease forwards;
  animation-delay: 0s, 2s;
}

.logo-wrapper.active #logo-blue {
  animation: blueFadeIn 0.5s ease forwards;
  animation-delay: 2s;
}

/* TEXT */
.brand-text {
  width: 380px;
  margin-left: 2px;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 20px;
}

.hero-inner {
  width: min(900px, 100%);
  border: 1px solid var(--line);
  border-radius: 26px;
  background: rgba(255,255,255,0.02);
  padding: 42px 28px;
}

/* STATUS */
.status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 26px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7fb2ff;
  animation: blink 1.4s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes flashAnim {
  0% { opacity: 0; }
  30% { opacity: 1; }
  100% { opacity: 0; }
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="brand-block">
  <div class="logo-wrapper" id="logoWrapper">
    <!-- 🔥 BURAYA 1024 LOGOLARI KOY -->
    <img src="assets/logo/logo_glow_red.png" id="logo-red" class="logo">
    <img src="assets/logo/logo_glow_blue.png" id="logo-blue" class="logo">
  </div>

  <img src="assets/logo/eigen.png" class="brand-text">
</div>

<main class="hero">
  <section class="hero-inner">

    <div class="status">
      <span class="dot"></span>
      <span>System Initializing</span>
    </div>

    <h1>A new way to understand structure in visual data.</h1>
    <p>Geometry over pixels. Extracting meaning from complexity.</p>

  </section>
</main>

<script>

// başlat
setTimeout(() => {

  // flash 2. saniyede gelsin
  setTimeout(() => {
    document.getElementById("flash").style.animation = "flashAnim 0.5s ease";
  }, 2000);

  document.getElementById("logoWrapper").classList.add("active");

}, 400);

</script>

</body>
</html>
